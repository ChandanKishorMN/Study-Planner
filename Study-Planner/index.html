<!DOCTYPE html>
<html>
<head>
<title>Smart Study Planner</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>📚 Smart Study Planner</h1>

<div class="input-section">

<input type="text" id="subject" placeholder="Subject Name">
<input type="text" id="task" placeholder="Study Task">
<input type="time" id="deadline">

<button onclick="addTask()">Add Task</button>

</div>

<div class="stats">

<div class="card">
<h3>Total</h3>
<p id="total">0</p>
</div>

<div class="card">
<h3>Completed</h3>
<p id="completed">0</p>
</div>

<div class="card">
<h3>Remaining</h3>
<p id="remaining">0</p>
</div>

</div>

<ul id="taskList"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
